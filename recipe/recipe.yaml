context:
  version: "2.5.1"

package:
  name: watchexec
  version: ${{ version }}

source:
  url: https://github.com/watchexec/watchexec/archive/v${{ version }}.tar.gz
  sha256: e54683eae585c7d3e47054eba9ff9e1e2327cdb3b705df0f96a9e66a0781ec5f

build:
  number: 0
  skip: win

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - watchexec --help

about:
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Execute commands when watched files change
  homepage: https://github.com/watchexec/watchexec
  repository: https://github.com/watchexec/watchexec

extra:
  recipe-maintainers:
    - danielnachun
